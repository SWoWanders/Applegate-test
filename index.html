<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#33ff33;--green-dim:#1a8a1a;--green-dark:#0a2e0a;--green-darker:#051505;
  --amber:#ffb000;--amber-dim:#8a5f00;
  --bg:#000;--scan:rgba(51,255,51,0.03);
}
html,body{height:100%;background:var(--bg);color:var(--green);font-family:"Courier New",ui-monospace,monospace;}
body{background:
  radial-gradient(ellipse at center, rgba(51,255,51,0.08) 0%, transparent 70%),
  linear-gradient(180deg, #000 0%, #020602 100%);
  min-height:100vh; overflow-x:hidden;
  line-height:1.5;
  position:relative;
}
/* CRT scanlines */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg, transparent 0px, transparent 2px, var(--scan) 2px, var(--scan) 4px);
}
/* Flicker */
body::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:2;
  background:rgba(51,255,51,0.01);animation:flicker 0.15s infinite;
}
@keyframes flicker{0%{opacity:0.7;}50%{opacity:1;}100%{opacity:0.7;}}

.container{max-width:900px;margin:0 auto;padding:24px 16px;position:relative;z-index:3;}

header{text-align:center;padding:40px 0 32px;border-bottom:1px solid var(--green-dim);margin-bottom:32px;}
h1{font-size:clamp(28px,6vw,48px);letter-spacing:8px;font-weight:400;text-shadow:0 0 20px var(--green);margin-bottom:12px;}
h1 .arrow{color:var(--amber);text-shadow:0 0 20px var(--amber);margin:0 8px;}
.tagline{color:var(--green-dim);letter-spacing:4px;font-size:12px;}
.cursor{display:inline-block;width:10px;height:16px;background:var(--green);animation:blink 1s step-end infinite;vertical-align:text-top;margin-left:4px;}
@keyframes blink{50%{opacity:0;}}

.section{margin-bottom:28px;}
.section-title{color:var(--green-dim);font-size:11px;letter-spacing:3px;margin-bottom:10px;}
.section-title::before{content:"▸ ";color:var(--green);}

.btn-group{display:flex;gap:12px;flex-wrap:wrap;}
.btn{background:transparent;border:1px solid var(--green-dim);color:var(--green-dim);padding:12px 20px;
  font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;
  flex:1;min-width:140px;text-align:center;}
.btn:hover{border-color:var(--green);color:var(--green);box-shadow:inset 0 0 20px rgba(51,255,51,0.15);}
.btn.btn-active{border-color:var(--green);color:var(--green);background:rgba(51,255,51,0.08);
  box-shadow:inset 0 0 20px rgba(51,255,51,0.15),0 0 10px rgba(51,255,51,0.3);}
.btn.btn-js.btn-active{border-color:var(--amber);color:var(--amber);background:rgba(255,176,0,0.08);
  box-shadow:inset 0 0 20px rgba(255,176,0,0.15),0 0 10px rgba(255,176,0,0.3);}

.btn-d{background:transparent;border:1px solid var(--green-dim);color:var(--green-dim);
  padding:8px 14px;font-family:inherit;font-size:11px;letter-spacing:1px;cursor:pointer;
  transition:all 0.15s;}
.btn-d:hover{border-color:var(--green);color:var(--green);}
.btn-d.btn-active{border-color:var(--green);color:var(--green);background:rgba(51,255,51,0.08);}

.dialect-group{display:flex;gap:8px;flex-wrap:wrap;}

.io-panel{border:1px solid var(--green-dim);background:rgba(10,46,10,0.2);padding:16px;margin-bottom:16px;}
.io-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px dashed var(--green-dim);}
.io-label{color:var(--green);font-size:11px;letter-spacing:2px;}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;
  box-shadow:0 0 8px var(--green);display:inline-block;vertical-align:middle;margin-right:6px;}
.dot-js{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.line-count{color:var(--green-dim);font-size:11px;letter-spacing:1px;}

textarea#input{width:100%;min-height:200px;background:#000;border:1px solid var(--green-dim);

  line-height:1.6;letter-spacing:0.5px;}
textarea#input:focus{border-color:var(--green);box-shadow:inset 0 0 20px rgba(51,255,51,0.1);}

pre#output{background:#000;border:1px solid var(--green-dim);min-height:200px;max-height:500px;

pre#output.err{color:#ff3333;border-color:#ff3333;}
pre#output:empty::before{content:"-- awaiting input --";color:var(--green-dim);font-style:italic;}

.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}

#exlist{display:flex;flex-wrap:wrap;gap:6px;}

#statusLine{color:var(--green);letter-spacing:2px;font-size:11px;text-align:center;

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);

  opacity:0;transition:opacity 0.3s;z-index:100;font-size:12px;}
.toast.show{opacity:1;}

.panel-divider{height:1px;background:linear-gradient(90deg,transparent,var(--green-dim),transparent);
  margin:24px 0;}
</style>
</head>

function setTarget(t) {
  _target = t;
  document.getElementById('btnPy').className   = 'btn btn-s' + (t==='python'?' btn-active':'');
  document.getElementById('btnHtml').className = 'btn btn-js' + (t==='html'?' btn-active':'');
  document.getElementById('outLabel').textContent = t==='html' ? 'HTML / JAVASCRIPT OUTPUT' : 'PYTHON 3 OUTPUT';
  document.getElementById('outDot').className  = 'dot' + (t==='html'?' dot-js':'');
  updateStatus(); clearOutput();
}

function setDialect(d) {
  _dialect = d;
  var names = {apple:'APPLESOFT',gw:'GW-BASIC',c64:'COMMODORE 64',bbc:'BBC BASIC'};
  ['apple','gw','c64','bbc'].forEach(function(id) {
    document.getElementById('d'+id.charAt(0).toUpperCase()+id.slice(1)).className = 'btn-d' + (id===d?' btn-active':'');
  });
  // fix IDs
  document.getElementById('dApple').className = 'btn-d' + (d==='apple'?' btn-active':'');
  document.getElementById('dGW').className    = 'btn-d' + (d==='gw'   ?' btn-active':'');
  document.getElementById('dC64').className   = 'btn-d' + (d==='c64'  ?' btn-active':'');
  document.getElementById('dBBC').className   = 'btn-d' + (d==='bbc'  ?' btn-active':'');
  document.getElementById('inputLabel').textContent = 'BASIC INPUT';
  buildExamples(); updateStatus(); clearOutput();
}

function updateStatus() {
  var dNames = {apple:'APPLESOFT',gw:'GW-BASIC',c64:'C64 BASIC',bbc:'BBC BASIC'};
  var tName  = _target==='html' ? 'HTML/JS' : 'PYTHON 3';
  document.getElementById('statusLine').textContent = dNames[_dialect] + ' \u2192 ' + tName;
}

var PLACEHOLDER_PY   = '# ── SUPPORTED COMMANDS ──────────────────\n# PRINT ? INPUT GET READ DATA RESTORE\n# FOR/NEXT/STEP GOTO GOSUB RETURN\n# ON..GOTO ON..GOSUB IF/THEN/ELSE\n# DEF FN DIM ONERR RESUME END STOP\n# GR HGR HGR2 COLOR= HCOLOR=\n# PLOT VLIN HLIN HPLOT..TO\n# DRAW/XDRAW AT (shape table decoder)\n# CALL (ROM lookup: -936 -868 -922 etc)\n# PEEK(-16384) keyboard non-blocking\n# POKE -16336 speaker click -> sound\n# CHR$(4);"OPEN/READ/WRITE" DOS files\n# GW-BASIC: LOCATE LINE CIRCLE PSET\n#           INKEY$ COLOR SCREEN PLAY\n# C64: POKE SYS colors sprites\n# BBC: MODE MOVE DRAW PROC VDU';

function clearOutput() {
  _output = '';
  var el = document.getElementById('output');
  el.className = 'empty';
  el.textContent = _target==='html' ? PLACEHOLDER_HTML : PLACEHOLDER_PY;
  document.getElementById('lineCount').textContent = '';
  document.getElementById('btnCopy').disabled = true;
  document.getElementById('btnPreview').style.display = 'none';
  var w = document.getElementById('warns'); w.style.display='none'; w.textContent='';
}

function doClear() { document.getElementById('input').value = ''; clearOutput(); }

function setOutput(code, warnings, isErr) {
  _output = code;
  var el = document.getElementById('output');
  el.className = isErr ? 'err' : '';
  el.textContent = code;
  document.getElementById('lineCount').textContent = code.split('\n').length + ' LINES';
  document.getElementById('btnCopy').disabled = false;
  if (!isErr && _target==='html') document.getElementById('btnPreview').style.display = '';
  if (warnings && warnings.length) {
    var w = document.getElementById('warns');
    w.textContent = '\u26a0  ' + warnings.join('\n\u26a0  ');
    w.style.display = '';
  }
  document.getElementById('outputPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

function copyOutput() {
  if (!_output) return;
  navigator.clipboard.writeText(_output).then(function() {
    var t = document.getElementById('toast'); t.classList.add('show');
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function(){t.classList.remove('show');}, 1600);
  });
}

function previewHTML() {
  if (!_output || _target!=='html') return;
  window.open(URL.createObjectURL(new Blob([_output],{type:'text/html'})),'_blank');
}

function detectDialect(code) {
  var u = code.toUpperCase();
  var scores = {apple:0, gw:0, c64:0, bbc:0};
  // Applesoft signatures
  if(/\bHGR\b|\bHGR2\b|\bHPLOT\b|\bHCOLOR\s*=/.test(u)) scores.apple += 3;
  if(/\bGR\b\s*(?::|\n|$)|\bCOLOR\s*=/.test(u)) scores.apple += 2;
  if(/\bCALL\s+-?\d+/.test(u)) scores.apple += 3;
  if(/\bONERR\s+GOTO/.test(u)) scores.apple += 3;
  if(/CHR\$\s*\(\s*4\s*\)/.test(u)) scores.apple += 3;
  if(/\bVTAB\b|\bHTAB\b|\bVLIN\b|\bHLIN\b/.test(u)) scores.apple += 2;
  if(/\bPOKE\s+-?16336\b|\bPEEK\s*\(\s*-?16384\b/.test(u)) scores.apple += 3;
  if(/\bPDL\s*\(|\bSCRN\s*\(/.test(u)) scores.apple += 2;
  if(/\bDRAW\s+\d+\s+AT\b|\bXDRAW\s+\d+\s+AT\b/.test(u)) scores.apple += 3;
  // GW-BASIC signatures
  if(/\bCLS\b/.test(u)) scores.gw += 2;
  if(/\bLOCATE\s+\d+/.test(u)) scores.gw += 3;
  if(/\bSCREEN\s+\d+/.test(u)) scores.gw += 3;
  if(/\bKEY\s+(?:OFF|ON)\b/.test(u)) scores.gw += 3;
  if(/\bLINE\s*\(/.test(u)) scores.gw += 3;
  if(/\bPSET\s*\(/.test(u)) scores.gw += 2;
  if(/\bINKEY\$/.test(u)) scores.gw += 2;
  if(/\bINPUT\$\s*\(/.test(u)) scores.gw += 2;
  if(/\bSTRING\$\s*\(/.test(u)) scores.gw += 2;
  if(/\bON\s+ERROR\s+GOTO/.test(u)) scores.gw += 2;
  if(/\bRANDOMIZE\b/.test(u)) scores.gw += 1;
  if(/\bLINE\s+INPUT\b/.test(u)) scores.gw += 3;
  // C64 signatures
  if(/\bPOKE\s+5328[01]\b/.test(u)) scores.c64 += 4;  // VIC-II screen colors
  if(/\bPOKE\s+532(4[8-9]|5\d|6\d|7\d)\b/.test(u)) scores.c64 += 3;  // sprites
  if(/\bSYS\s+\d+/.test(u)) scores.c64 += 3;
  if(/\bGET\s+[A-Z]\$/.test(u)) scores.c64 += 1;
  if(/PRINT\s+CHR\$\s*\(\s*147\s*\)/.test(u)) scores.c64 += 4;  // clear screen
  if(/\bPOKE\s+646\b/.test(u)) scores.c64 += 3;  // cursor color
  if(/\bPOKE\s+2040\b/.test(u)) scores.c64 += 3;  // sprite pointer
  // BBC BASIC signatures
  if(/\bMODE\s+\d/.test(u)) scores.bbc += 4;
  if(/\bVDU\b/.test(u)) scores.bbc += 3;
  if(/\bDEF\s+PROC/.test(u)) scores.bbc += 4;
  if(/\bENDPROC\b/.test(u)) scores.bbc += 4;
  if(/\bPROC[A-Z]/.test(u)) scores.bbc += 2;
  if(/\bGCOL\b/.test(u)) scores.bbc += 3;
  if(/\bMOVE\s+\d+\s*,/.test(u)) scores.bbc += 2;
  if(/\bDRAW\s+\d+\s*,\s*\d+/.test(u)) scores.bbc += 2;
  // Pick highest
  var best='apple', bestScore=0;
  ['apple','gw','c64','bbc'].forEach(function(d){ if(scores[d]>bestScore){bestScore=scores[d]; best=d;} });
  return {dialect: best, scores: scores, confident: bestScore>=3};
}

function doConvert() {
  var code = document.getElementById('input').value;
  if (!code.trim()) return;
  var btn = document.getElementById('btnConvert');
  btn.innerHTML = 'CONVERTING...'; btn.disabled = true;
  var el = document.getElementById('output');
  el.className='spin'; el.textContent='# CONVERTING...';
  setTimeout(function() {
    try {
      var result;
      // Auto-detect dialect
      var detected = detectDialect(code);
      var useDialect = _dialect;
      var dialectWarning = null;
      if (detected.confident && detected.dialect !== _dialect) {
        useDialect = detected.dialect;
        var names = {apple:'Applesoft', gw:'GW-BASIC', c64:'Commodore 64', bbc:'BBC BASIC'};
        dialectWarning = 'Detected ' + names[detected.dialect] + ' but you selected ' + names[_dialect] + ' \u2014 using ' + names[detected.dialect] + ' instead';
        // Update UI to reflect the detected dialect
        setDialect(useDialect);
      }
      if (useDialect==='apple') result = _target==='html' ? convertToHTML(code) : convertToPython(code);
      else result = _target==='html' ? convertAltToHTML(code,useDialect) : convertAltToPython(code,useDialect);
      if (dialectWarning) result.warnings.unshift(dialectWarning);
      setOutput(result.code, result.warnings, false);
    } catch(e) {
      setOutput('# Conversion error:\n# '+e.message, [], true);
    }
    btn.innerHTML='&#9654; CONVERT'; btn.disabled=false;

}

// SHARED PARSING HELPERS
// ═══════════════════════════════════════════════════════════
function splitColon(s) {
  // Split on : but NOT inside strings, parens, or after THEN keyword
  // (BASIC: everything after THEN is part of the IF, colon-stmts included)
  var parts=[],cur='',inStr=false,depth=0;
  var sUp=s.toUpperCase();
  // Check if this is an IF...THEN line; if so, only split up to THEN
  // Find THEN position (outside strings)
  var thenPos=-1;
  var ti=0,ts=false;
  while(ti<s.length){
    if(s[ti]==='"')ts=!ts;
    if(!ts&&sUp.slice(ti).match(/^\sTHEN\s/)){thenPos=ti;break;}
    ti++;
  }
  for(var i=0;i<s.length;i++){
    var ch=s[i];
    if(ch==='"')inStr=!inStr;
    if(!inStr){if(ch==='('||ch==='[')depth++;if(ch===')'||ch===']')depth--;}
    // Don't split after THEN position
    if(!inStr&&depth===0&&ch===':'&&(thenPos<0||i<thenPos)){
      parts.push(cur.trim());cur='';
    } else cur+=ch;
  }
  if(cur.trim())parts.push(cur.trim());return parts;
}
function parseDataLine(rest) {
  var items=[],cur='',inStr=false;
  for(var i=0;i<rest.length;i++){var ch=rest[i];if(ch==='"'){inStr=!inStr;cur+=ch;continue;}if(!inStr&&ch===','){items.push(cur.trim());cur='';continue;}cur+=ch;}
  if(cur.trim()!=='')items.push(cur.trim());return items;
}
function preprocessSource(code) {
  // Split lines, expand IF/THEN bodies that contain GOSUB-followed-by-more-statements
  // into multiple lines using synthetic decimal line numbers.
  // Example:
  //   60211 ...Q$=INPUT$(1):IF Q$="Q" THEN PRINT:PRINT "BYE":GOSUB 60890:SCREEN 0:CLS:RETURN
  // Becomes:
  //   60211 ...Q$=INPUT$(1):IF NOT(Q$="Q") THEN 60211.9
  //   60211.1 PRINT
  //   60211.2 PRINT "BYE"
  //   60211.3 GOSUB 60890
  //   60211.4 SCREEN 0
  //   60211.5 CLS
  //   60211.6 RETURN
  //   60211.9 (next statements after IF, if any - usually the next numbered line handles)
  // Actually since there's no ELSE part and the THEN body is the rest of the line,
  // we can simply transform to: IF cond THEN GOTO <synthetic>; then synthetic lines.
  // But BASIC doesn't support fractional line numbers natively; we use them internally
  // in our switch-case dispatch (which DOES support non-integer keys via _line assignment).
  
  var lines = code.split(/\r?\n/);
  var out = [];
  for(var li=0; li<lines.length; li++){
    var raw = lines[li];
    var handled = false;
    var m = raw.match(/^(\s*)(\d+)(\s+)(.*)$/);
    if(!m){ out.push(raw); continue; }
    var indent = m[1], lineNum = parseInt(m[2]), space = m[3], body = m[4];
    
    // Find IF...THEN position (case insensitive, not in strings)
    var thenMatch = null;
    var inStr = false;
    for(var ci=0; ci<body.length-4; ci++){
      if(body[ci]==='"'){inStr=!inStr; continue;}
      if(inStr)continue;
      if(body.slice(ci,ci+5).match(/^\s*IF\s/i)||
         body.slice(ci).match(/^\s*IF\s/i)&&(ci===0||body[ci-1]===':')){
        // Found IF at this position - look for THEN
        var rest = body.slice(ci);
        var ti = 0, ts = false;
        for(; ti<rest.length-4; ti++){
          if(rest[ti]==='"')ts=!ts;
          if(!ts && rest.slice(ti).match(/^\s+THEN\s/i)){
            // Check the THEN body
            var thenStart = ti + rest.slice(ti).match(/^(\s+THEN\s+)/i)[1].length + ci;
            var thenBody = body.slice(thenStart);
            // Does THEN body contain GOSUB followed by more statements?
            // Split thenBody by colons (string-aware), find GOSUB that isn't last
            var tsplits = [];
            var cur='', ss=false;
            for(var ii=0; ii<thenBody.length; ii++){
              if(thenBody[ii]==='"'){ss=!ss; cur+=thenBody[ii]; continue;}
              if(!ss && thenBody[ii]===':'){tsplits.push(cur); cur=''; continue;}
              cur += thenBody[ii];
            }
            if(cur) tsplits.push(cur);
            // Look for GOSUB not at last position
            var hasEmbeddedGosub = false;
            for(var si=0; si<tsplits.length-1; si++){
              if(/^\s*GOSUB\s+\d+\s*$/i.test(tsplits[si])){
                hasEmbeddedGosub = true;
                break;
              }
            }
            if(hasEmbeddedGosub){
              // Rewrite: keep everything before THEN, then add synthetic lines
              var preThen = body.slice(0, thenStart - rest.slice(ti).match(/^(\s+THEN\s+)/i)[1].length).replace(/\s*$/,'');
              // Extract IF condition
              var ifM = body.slice(ci).match(/^(\s*IF\s+)([\s\S]+?)(\s+THEN\s+)/i);
              if(ifM){
                var preBody = body.slice(0,ci); // stuff before the IF
                var condExpr = ifM[2];
                // Skip target = the NEXT numbered line after this one
                var nextNumMatch = null;
                for(var nj=li+1; nj<lines.length; nj++){
                  var nm = lines[nj].match(/^\s*(\d+)\s/);
                  if(nm){ nextNumMatch = parseInt(nm[1]); break; }
                }
                var skipTarget = nextNumMatch!==null ? nextNumMatch : (lineNum + 1);
                // Build synthetic lines
                var synLines = [];
                synLines.push(indent + lineNum + space + preBody + 'IF NOT(' + condExpr + ') THEN GOTO ' + skipTarget);
                tsplits.forEach(function(stmt, si){
                  var synNum = (lineNum + (si+1)*0.001).toFixed(3);
                  synLines.push(indent + synNum + ' ' + stmt.trim());
                });
                synLines.forEach(function(l){ out.push(l); });
                handled = true;
                break;
              }
            }
            break; // found THEN, don't keep looking
          }
        }
        break; // found IF, don't keep looking for another IF on this line
      }
    }
    if(!handled) out.push(raw);
  }
  return out.join('\n');
}

function parseNumbered(code) {
  var numbered=[];
  code.trim().split(/\r?\n/).forEach(function(raw){var m=raw.match(/^\s*([\d.]+)\s*(.*)/);if(m)numbered.push({num:parseFloat(m[1]),stmt:m[2].trim()});});
  return numbered;
}

// ═══════════════════════════════════════════════════════════
// SHAPE TABLE DECODER
// Apple II shape tables: binary data encoded as direction vectors
// Directions: 0=up,1=up-right,2=right,3=down-right,
//             4=down,5=down-left,6=left,7=up-left
// Bit 6 set = plot point; bit 7 set = end of shape
// ═══════════════════════════════════════════════════════════
function decodeShapeTable(mem, baseAddr) {
  // mem is the _mem object, baseAddr is where the table starts
  // Returns array of {x,y,plot} vectors for each shape
  var shapes = [];
  try {
    var numShapes = mem[baseAddr] || 1;
    for (var s = 1; s <= numShapes; s++) {
      var offsetLo = mem[baseAddr + s*2 - 1] || 0;
      var offsetHi = mem[baseAddr + s*2]     || 0;
      var shapeStart = baseAddr + offsetLo + offsetHi*256;
      var vectors = [];
      var cx=0, cy=0;
      var maxBytes = 64;
      for (var i=0; i<maxBytes; i++) {
        var b = mem[shapeStart + i] || 0;
        if (b === 0) break;
        // Each byte can encode 1 or 2 vectors
        // Low 3 bits = first vector direction
        // Bit 2 = plot for first vector
        // Bits 3-5 = second vector direction (if nonzero)
        // Bit 5 = plot for second vector
        // Bit 6 = set means END
        var dir1  = b & 7;
        var plot1 = (b & 64) !== 0;
        var dir2  = (b >> 3) & 7;
        var dx1=0,dy1=0,dx2=0,dy2=0;
        var DX=[0,1,1,1,0,-1,-1,-1], DY=[-1,-1,0,1,1,1,0,-1];
        dx1=DX[dir1]; dy1=DY[dir1];
        cx+=dx1; cy+=dy1;
        if(plot1) vectors.push({x:cx,y:cy,plot:true});
        else vectors.push({x:cx,y:cy,plot:false});
        if(dir2 !== 0) {
          dx2=DX[dir2]; dy2=DY[dir2];
          var plot2 = (b & 32) !== 0;
          cx+=dx2; cy+=dy2;
          if(plot2) vectors.push({x:cx,y:cy,plot:true});
        }
        if((b & 128) !== 0) break; // end of shape
      }
      shapes.push(vectors);
    }
  } catch(e) { shapes = []; }
  return shapes;
}

var _PY_FUNCS = new Set([
  // Python builtins
  'int','abs','float','str','len','ord','chr','print','input','range',
  'min','max','sum','round','list','dict','set','tuple','bool','type',
  // Module names (matched as prefix before dot)
  'math','random','sys','os',
  // math module functions (matched as just the function name after 'math.')
  'sqrt','sin','cos','tan','atan','exp','log','log10','pi','trunc','ceil','floor',
  // BASIC helper functions
  '_sgn','_rnd','_midS','_leftS','_rightS','_spc','_tab','_fre','_usr',
  '_peek','_poke','_scrn','_pdl','_kb_peek','_kb_clear','_speaker_click',
  '_gr_init','_gr_text','_gr_color','_gr_hcolor','_gr_plot','_gr_vlin',
  '_gr_hlin','_gr_hmove','_gr_hline_to','_gr_draw_shape',
  '_dos_open','_dos_close','_dos_set_read','_dos_input_str','_dos_input_num',
  '_dos_print','_call_usr','_stop','_end','_get',
  // GW-BASIC graphics and input helpers
  '_gw_line','_gw_pset','_gw_cx','_gw_cy','_gw_input','_gw_inkey',
  '_strRep','_pf','_locate',
  // Other common names that are NOT array variables
  'parseFloat','parseInt','String','Number','Math','Array','Object',
  'True','False','None',
  // Python builtins used in generated code
  'isinstance','hasattr','getattr','setattr','type','repr','hash',
  'zip','map','filter','sorted','enumerate','reversed','any','all',
  'open','print','input','range','len','abs','max','min','sum','round'
]);
function _arrBrackets(e) {
  // Depth-aware array () -> [] converter handles nested: dn(ml(x,0),ml(x,1)) -> dn[ml[x][0]][ml[x][1]]
  var result = '', i = 0;
  while (i < e.length) {
    var m = e.slice(i).match(/^([a-z_][a-z0-9_]*)\(/);
    if (!m) { result += e[i++]; continue; }
    var name = m[1];
    var pStart = i + name.length;
    var dep = 0, j = pStart;
    while (j < e.length) {
      if (e[j] === '(') dep++;
      else if (e[j] === ')') { dep--; if (dep === 0) break; }
      j++;
    }
    var innerArgs = _arrBrackets(e.slice(pStart + 1, j));
    if (_PY_FUNCS.has(name) || name.startsWith('_fn_') || name.startsWith('math.') || name.startsWith('random.')) {
      result += name + '(' + innerArgs + ')';
    } else {
      var idxs = [], dep2 = 0, cur = '';
      for (var k = 0; k < innerArgs.length; k++) {
        var c = innerArgs[k];
        if (c === '(' || c === '[') dep2++;
        else if (c === ')' || c === ']') dep2--;
        if (c === ',' && dep2 === 0) { idxs.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      if (cur.trim()) idxs.push(cur.trim());
      result += name + idxs.map(function(x){ return '['+x+']'; }).join('');
    }
    i = j + 1;
  }
  return result;
}

// ── String-aware identifier lowercaser ───────────────────────
var _PY_KEYWORDS=new Set([
  // Only rename BASIC variable names that clash with Python keywords
  // (operators and control flow are already handled by BASIC converter)
  'in','is','as','lambda','yield','with','del','global','nonlocal',
  'assert','raise','import','from','class','finally'
]);
function _lcIdents(e) {
  // Walk character by character; skip "..." strings and _helper names
  // Rename Python keywords used as BASIC variables by appending _v
  var res='', inStr=false, i=0;
  while(i<e.length){
    if(e[i]==='"'){ inStr=!inStr; res+=e[i++]; continue; }
    if(inStr){ res+=e[i++]; continue; }
    var m=e.slice(i).match(/^([A-Za-z_][A-Za-z0-9_]*)/);
    if(m){
      var word=m[1];
      if(word[0]==='_' || word.indexOf('.')>=0){
        res+=word;
      } else {
        var lw=word.toLowerCase();
        // If this bare word is a Python keyword, prefix with _v_ to avoid clash
        if(_PY_KEYWORDS.has(lw)) lw='_v_'+lw;
        res+=lw;
      }
      i+=word.length;
    } else { res+=e[i++]; }
  }
  return res;
}

// ── Python comparison fixer (= → == in conditions) ───────────
function _fixCmp(e){
  // Replace bare = (not ==, !=, <=, >=) with ==
  // Run in a loop until stable
  var prev='';
  while(prev!==e){
    prev=e;
    e=e.replace(/([^=!<>])=([^=])/g,'$1==$2');
  }
  return e;
}

// ── Array () → [] converter ───────────────────────────────────
// Python functions stay as func() but array variables become arr[i]



function exprConvPy(e,fnDefs) {
  e=e.trim();
  // ── Function substitutions (before any lowercasing) ────────
  e=e.replace(/\bINT\s*\(/gi,'int(');
  e=e.replace(/\bABS\s*\(/gi,'abs(');
  e=e.replace(/\bSGN\s*\(/gi,'_sgn(');
  e=e.replace(/\bSQR\s*\(/gi,'math.sqrt(');
  e=e.replace(/\bSIN\s*\(/gi,'math.sin(');
  e=e.replace(/\bCOS\s*\(/gi,'math.cos(');
  e=e.replace(/\bTAN\s*\(/gi,'math.tan(');
  e=e.replace(/\bATN\s*\(/gi,'math.atan(');
  e=e.replace(/\bEXP\s*\(/gi,'math.exp(');
  e=e.replace(/\bLOG\s*\(/gi,'math.log(');
  e=e.replace(/\bRND\s*\(\s*0\s*\)/gi,'_rnd(0)');
  e=e.replace(/\bRND\s*\(([^)]+)\)/gi,function(_,a){return '_rnd('+exprConvPy(a,fnDefs)+')';});
  e=e.replace(/\bLEN\s*\(/gi,'len(');
  e=e.replace(/\bMID\$\s*\(/gi,'_midS(');
  e=e.replace(/\bLEFT\$\s*\(/gi,'_leftS(');
  e=e.replace(/\bRIGHT\$\s*\(/gi,'_rightS(');
  e=e.replace(/\bSTR\$\s*\(/gi,'str(');
  e=e.replace(/\bVAL\s*\(/gi,'float(');
  // CHR$: wrap arg in int() and close both parens
  e=e.replace(/\bCHR\$\s*\(([^)]+)\)/gi,function(_,a){return 'chr(int('+exprConvPy(a,fnDefs)+'))';});
  e=e.replace(/\bASC\s*\(/gi,'ord(');
  e=e.replace(/\bSPC\s*\(/gi,'_spc(');
  e=e.replace(/\bTAB\s*\(/gi,'_tab(');
  e=e.replace(/\bSCRN\s*\(/gi,'_scrn(');
  e=e.replace(/\bPDL\s*\(/gi,'_pdl(');
  e=e.replace(/\bSTICK\s*\(/gi,'_gw_stick(');
  e=e.replace(/\bSTRIG\s*\(/gi,'_gw_strig(');
  e=e.replace(/\bFRE\s*\(/gi,'_fre(');
  e=e.replace(/\bUSR\s*\(/gi,'_usr(');
  // GW-BASIC functions
  e=e.replace(/\bINPUT\$\s*\(([^)]+)\)/gi,function(_,n){return '_gw_input(int('+exprConvPy(n,fnDefs)+'))';});
  e=e.replace(/\bSTRING\$\s*\(([^,)]+),([^)]+)\)/gi,function(_,n,c){
    var cn=exprConvPy(c.trim(),fnDefs);
    var nn=exprConvPy(n.trim(),fnDefs);
    // STRING$(n, charcode) or STRING$(n, string)
    return '_strRep('+nn+','+cn+')';
  });
  e=e.replace(/\bPOS\s*\(\s*\d+\s*\)/gi,'0  # POS()');
  e=e.replace(/\bCSRLIN\b/gi,'1  # CSRLIN');
  e=e.replace(/\bTIMER\b/gi,'__import__("time").time()%86400');
  e=e.replace(/\bINKEY\$\b/gi,'_gw_inkey()');

  // Special PEEK addresses
  e=e.replace(/\bPEEK\s*\(\s*(-?\d+)\s*\)/gi,function(_,addr){
    return PEEK_SPECIAL_PY[addr.trim()]||('_peek('+addr.trim()+')');
  });
  e=e.replace(/\bPEEK\s*\(/gi,'_peek(');
  // DEF FN calls
  e=e.replace(/\bFN\s+([A-Za-z][A-Za-z0-9]*)\s*\(([^)]*)\)/gi,function(_,nm,arg){
    return '_fn_'+nm.toLowerCase()+'('+exprConvPy(arg,fnDefs)+')';
  });
  // Variable type suffixes: NAME% → _i_name  NAME$ → _s_name
  e=e.replace(/([A-Za-z][A-Za-z0-9]*)\%/g,function(_,v){return '_i_'+v.toLowerCase();});
  e=e.replace(/([A-Za-z][A-Za-z0-9]*)\$/g,function(_,v){return '_s_'+v.toLowerCase();});
  // Operators
  e=e.replace(/<>/g,'!=');
  e=e.replace(/\^/g,'**');
  e=e.replace(/\bAND\b/gi,' and ');
  e=e.replace(/\bOR\b/gi,' or ');
  e=e.replace(/\bNOT\b/gi,' not ');
  // Lowercase identifiers but NOT string literal content
  e=_lcIdents(e);
  // Convert array access a(i) → a[i] (but not function calls)
  e=_arrBrackets(e);
  return e;
}


function convPrintArgsPy(args,fnDefs) {
  if(args.trim()==='')return 'print()';
  var trailSemi=/;\s*$/.test(args), trailComma=/,\s*$/.test(args);
  var parts=[],cur='',inStr=false,depth=0;
  for(var i=0;i<args.length;i++){
    var ch=args[i];
    if(ch==='"')inStr=!inStr;
    if(!inStr){if(ch==='('||ch==='[')depth++;if(ch===')'||ch===']')depth--;}
    if(!inStr&&depth===0&&(ch===';'||ch===',')){if(cur.trim())parts.push(cur.trim());cur='';}
    else cur+=ch;
  }
  if(cur.trim())parts.push(cur.trim());
  var pp=parts.map(function(p){
    // Only apply _fixCmp to non-string expressions (comparisons in PRINT)
    var v=exprConvPy(p,fnDefs);
    // For pure string literals, don't run fixCmp (it mangled "X=" -> "X==")
    var isStr=/^"/.test(v)||/^_s_/.test(v);
    if(!isStr) v=_fixCmp(v);
    // Applesoft/GW-BASIC: numeric values in PRINT get space-padded (sign + trailing)
    return isStr?v:'_pf('+v+')';
  });
  var joined=pp.join('+');  // + concatenates, not , (which adds spaces)
  if(trailSemi) return "print("+joined+", end='')";
  if(trailComma) return "print("+joined+", end='\\t')";
  return "print("+joined+")";
}



// Detect DOS 3.3 CHR$(4) file commands
function dosCmd(stmt,ind,warnings) {
  // Pattern: PRINT CHR$(4);"OPEN filename" etc
  var m=stmt.match(/^(?:PRINT|\?)\s*CHR\$\s*\(\s*4\s*\)\s*[;,]\s*"([^"]*)"/i);
  if(!m)return null;
  var cmd=m[1].trim().toUpperCase();
  var parts=cmd.split(/\s+/,2);
  var op=parts[0], fname=parts[1]||'_dos_file';
  var pyFname='"'+fname.toLowerCase()+'"';
  if(op==='OPEN')   return [ind+'_dos_open('+pyFname+',"r")'];
  if(op==='APPEND') return [ind+'_dos_open('+pyFname+',"a")'];
  if(op==='WRITE')  return [ind+'_dos_open('+pyFname+',"w")'];
  if(op==='CREATE') return [ind+'_dos_open('+pyFname+',"w")'];
  if(op==='CLOSE')  return [ind+'_dos_close()'];
  if(op==='DELETE') return [ind+'import os; os.remove('+pyFname+') if os.path.exists('+pyFname+') else None'];
  if(op==='READ')   return [ind+'_dos_set_read()'];
  if(op==='EXEC')   { warnings.push('DOS EXEC not supported'); return [ind+'pass  # EXEC '+fname]; }
  return null;
}
function dosCmdJS(stmt,ind,warnings) {
  var m=stmt.match(/^(?:PRINT|\?)\s*CHR\$\s*\(\s*4\s*\)\s*[;,]\s*"([^"]*)"/i);
  if(!m)return null;
  var cmd=m[1].trim().toUpperCase();
  var parts=cmd.split(/\s+/,2);
  var op=parts[0], fname=(parts[1]||'file').toLowerCase();
  if(op==='OPEN')   return [ind+'_dosOpen("'+fname+'","r");'];
  if(op==='APPEND') return [ind+'_dosOpen("'+fname+'","a");'];
  if(op==='WRITE')  return [ind+'_dosOpen("'+fname+'","w");'];
  if(op==='CREATE') return [ind+'_dosOpen("'+fname+'","w");'];
  if(op==='CLOSE')  return [ind+'_dosClose();'];
  if(op==='DELETE') return [ind+'_dosDelete("'+fname+'");'];
  if(op==='READ')   return [ind+'_dosSetRead();'];
  return null;
}

// Fix BASIC = to Python == in condition contexts
function fixPyCmp(e) {
  var result='',inStr=false,i=0;
  while(i<e.length){
    if(e[i]==='"'){inStr=!inStr;result+=e[i++];continue;}
    if(inStr){result+=e[i++];continue;}
    if(e[i]==='='&&(i===0||'=!<>'.indexOf(e[i-1])<0)&&(i+1>=e.length||e[i+1]!=='=')){
      result+='==';i++;
    } else {result+=e[i++];}
  }
  return result;
}

// ═══════════════════════════════════════════════════════════
// PYTHON STATEMENT CONVERTER (Applesoft)
// ═══════════════════════════════════════════════════════════
function convStmtPy(stmt,ind,ctx) {
  var warnings=ctx.warnings,fnDefs=ctx.fnDefs;
  stmt=stmt.trim(); if(!stmt)return[];
  var out=[],E=function(x){return exprConvPy(x,fnDefs);};

  if(/^REM\b/i.test(stmt)||stmt.startsWith("'")){out.push(ind+'# '+stmt.replace(/^REM\s*/i,'').replace(/^'/,''));return out;}
  if(/^END$/i.test(stmt)){out.push(ind+'_end()');return out;}
  if(/^STOP$/i.test(stmt)){out.push(ind+'_stop(_line)');return out;}
  if(/^CONT$/i.test(stmt)){out.push(ind+'pass  # CONT');return out;}

  // DOS 3.3 CHR$(4) file commands — must check before PRINT
  var dosOut=dosCmd(stmt,ind,warnings);
  if(dosOut)return dosOut;

  var prM=stmt.match(/^(?:PRINT|\?)\s*(.*)/is);
  if(prM){out.push(ind+convPrintArgsPy(prM[1],fnDefs));return out;}

  var inM=stmt.match(/^INPUT\s+(.+)/i);
  if(inM){
    var rest=inM[1].trim(),prompt='"? "';
    var pm=rest.match(/^"([^"]*)"\s*[;,]\s*(.+)/);
    if(pm){prompt='"'+pm[1]+' "';rest=pm[2];}
    rest.split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$$/.test(vt);
      out.push(isStr?ind+pv+' = input('+prompt+')':ind+pv+' = float(input('+prompt+'))');});
    return out;
  }

  // INPUT from DOS file
  var inDosM=stmt.match(/^INPUT\s*#\s*\d+\s*,\s*(.+)/i);
  if(inDosM){
    inDosM[1].split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$$/.test(vt);
      out.push(isStr?ind+pv+' = _dos_input_str()':ind+pv+' = _dos_input_num()');});
    return out;
  }

  var getM=stmt.match(/^GET\s+(.+)/i);
  if(getM){out.push(ind+E(getM[1].trim())+' = _get()');return out;}

  var readM=stmt.match(/^READ\s+(.+)/i);
  if(readM){readM[1].split(',').forEach(function(v){var vt=v.trim(),pv=E(vt),isStr=/\$/.test(vt);
    out.push(isStr?ind+pv+' = str(_data[_dp]); _dp += 1':ind+pv+' = float(_data[_dp]); _dp += 1');});return out;}

  if(/^RESTORE$/i.test(stmt)){out.push(ind+'_dp = 0');return out;}
  if(/^DATA\b/i.test(stmt)){out.push(ind+'# DATA '+stmt.slice(4).trim());return out;}

  var defM=stmt.match(/^DEF\s+FN\s+([A-Za-z][A-Za-z0-9]*)\s*\(([^)]*)\)\s*=\s*(.+)/i);
  if(defM){var nm=defM[1].toLowerCase(),param=E(defM[2].trim()),body=E(defM[3]);fnDefs.push(nm);
    out.push(ind+'def _fn_'+nm+'('+param+'): return '+body);return out;}

  // Assignment — depth-aware = finder handles nested arrays on LHS
  // e.g. DN%(ML%(X,0),ML%(X,1))=value -> dn[ml[x][0]][ml[x][1]] = value
  // Guard: skip if statement starts with a BASIC keyword that uses = differently
  var _letSkip=/^(FOR|IF|DEF|COLOR|HCOLOR|SCALE|ROT|SPEED|PRINT|INPUT|LET\s*$)\b/i.test(stmt)&&!/^LET\s+[A-Za-z]/i.test(stmt);
  if(!_letSkip){
    var _letDepth=0, _letEq=-1;
    var _letStart=stmt.match(/^LET\s+/i)?stmt.match(/^LET\s+/i)[0].length:0;
    for(var _ci=_letStart;_ci<stmt.length;_ci++){
      var _cc=stmt[_ci];
      if(_cc==='('||_cc==='[')_letDepth++;
      else if(_cc===')'||_cc===']')_letDepth--;
      else if(_cc==='='&&_letDepth===0&&(_ci===0||'=!<>'.indexOf(stmt[_ci-1])<0)&&(_ci+1>=stmt.length||stmt[_ci+1]!=='=')){
        _letEq=_ci; break;
      }
    }
    if(_letEq>_letStart){
      var _lhsRaw=stmt.slice(_letStart,_letEq).trim();
      var _rhsRaw=stmt.slice(_letEq+1).trim();
      if(/^[A-Za-z]/.test(_lhsRaw)){
        out.push(ind+E(_lhsRaw)+' = '+E(_rhsRaw));return out;
      }
    }
  }

  var forM=stmt.match(/^FOR\s+([A-Za-z][A-Za-z0-9]*%?)\s*=\s*(.+?)\s+TO\s+(.+?)(?:\s+STEP\s+(.+))?$/i);
  if(forM){
    var v=E(forM[1]), s=E(forM[2]), e2=E(forM[3]), st=forM[4]?E(forM[4]):'1';
    var vk=v.replace(/[^a-z0-9]/g,'_');
    out.push(ind+v+' = '+s);
    out.push(ind+'_for_end_'+vk+' = ('+e2+')');
    out.push(ind+'_for_step_'+vk+' = ('+st+')');
    out.push(ind+'_for_restart_'+vk+' = _lnums[_lmap[_line]+1]  # next line after FOR');
    return out;
  }
  var nextM=stmt.match(/^NEXT(?:\s+([A-Za-z][A-Za-z0-9]*%?))?$/i);
  if(nextM){
    var nv = nextM[1] ? E(nextM[1].trim()) : null;
    if(nv){
      var nvk=nv.replace(/[^a-z0-9_]/g,'_');
      out.push(ind+nv+' += _for_step_'+nvk);
      out.push(ind+'if (_for_step_'+nvk+' >= 0 and '+nv+' <= _for_end_'+nvk+') or (_for_step_'+nvk+' < 0 and '+nv+' >= _for_end_'+nvk+'):');
      out.push(ind+'    _line=_for_restart_'+nvk+';continue');
    } else {
      out.push(ind+'pass  # NEXT without variable name');
    }
    return out;
  }

  var gotoM=stmt.match(/^GOTO\s+(\d+)$/i);
  if(gotoM){out.push(ind+'_line='+gotoM[1]+';continue');return out;}

  // ON ERROR GOTO — check before ON GOTO (which would catch "ON ERROR")
  var _onErrEarly=stmt.match(/^ON\s+ERROR\s+GOTO\s+(\d+)$/i);
  if(_onErrEarly){out.push(ind+'_onerr = '+_onErrEarly[1]);return out;}

    var onGotoM=stmt.match(/^ON\s+(.+?)\s+GOTO\s+(.+)$/i);
  if(onGotoM){var tgts=onGotoM[2].split(',').map(function(t){return t.trim();});
    out.push(ind+'_on_idx = int('+_fixCmp(E(onGotoM[1]))+') - 1');
    tgts.forEach(function(t,i){out.push(ind+(i===0?'if':'elif')+' _on_idx=='+i+': _line='+t+';continue');});return out;}

  var onGosubM=stmt.match(/^ON\s+(.+?)\s+GOSUB\s+(.+)$/i);
  if(onGosubM){var tgts=onGosubM[2].split(',').map(function(t){return t.trim();});
    out.push(ind+'_on_idx = int('+_fixCmp(E(onGosubM[1]))+') - 1');
    tgts.forEach(function(t,i){out.push(ind+(i===0?'if':'elif')+' _on_idx=='+i+': _ret.append(_lnums[_lmap[_line]+1]);_line='+t+';continue');});return out;}

  var gosubM=stmt.match(/^GOSUB\s+(\d+)$/i);
  if(gosubM){out.push(ind+'_ret.append(_lnums[_lmap[_line]+1]);_line='+gosubM[1]+';continue');return out;}
  if(/^RETURN$/i.test(stmt)){out.push(ind+'_line=_ret.pop();continue');return out;}
  if(/^POP$/i.test(stmt)){out.push(ind+'if _ret: _ret.pop()');return out;}

  var onerrM=stmt.match(/^ONERR\s+GOTO\s+(\d+)$/i);
  if(onerrM){out.push(ind+'_onerr = '+onerrM[1]);return out;}
  if(/^RESUME\s+NEXT$/i.test(stmt)){out.push(ind+'_err_flag=False;_line=_err_resume;continue');return out;}
  if(/^RESUME$/i.test(stmt)){out.push(ind+'_err_flag=False');return out;}

  // IF THEN [ELSE] — unified string-aware handler
  // Handles: IF cond THEN body, IF cond THEN body ELSE alt
  // Also handles multi-statement THEN bodies: IF x THEN PRINT a;:Y=f(b) ELSE GOSUB n
  if(/^IF\b/i.test(stmt)){
    var _ifRest=stmt.slice(stmt.match(/^IF\s*/i)[0].length);
    // Find THEN (outside strings)
    var _tIdx=-1,_iStr=false;
    for(var _ti=0;_ti<_ifRest.length-3;_ti++){
      if(_ifRest[_ti]==='"')_iStr=!_iStr;
      if(!_iStr&&_ifRest.slice(_ti).match(/^THEN\b/i)&&(_ti===0||/[\s)]/.test(_ifRest[_ti-1]))){_tIdx=_ti;break;}
    }
    if(_tIdx>=0){
      var _icond=_ifRest.slice(0,_tIdx).trim();
      var _iafter=_ifRest.slice(_tIdx+4).trim();
      // Find ELSE (outside strings)
      var _eIdx=-1;_iStr=false;
      for(var _ei=0;_ei<_iafter.length-3;_ei++){
        if(_iafter[_ei]==='"')_iStr=!_iStr;
        if(!_iStr&&_iafter.slice(_ei).match(/^ELSE\b/i)&&(_ei===0||/[\s:]/.test(_iafter[_ei-1]))){_eIdx=_ei;break;}
      }
      out.push(ind+'if '+_fixCmp(E(_icond))+':');
      var _tbody=_eIdx>=0?_iafter.slice(0,_eIdx).trim():_iafter.trim();
      var _tgonly=_tbody.match(/^(?:GOTO\s+)?(\d+)$/i);
      if(_tgonly){out.push(ind+'    _line='+_tgonly[1]+';continue');}
      else{splitColon(_tbody).forEach(function(s){convStmtPy(s,ind+'    ',ctx).forEach(function(l){out.push(l);});});}
      if(_eIdx>=0){
        var _ebody=_iafter.slice(_eIdx+4).trim();
        out.push(ind+'else:');
        var _egonly=_ebody.match(/^(?:GOTO\s+)?(\d+)$/i);
        if(_egonly){out.push(ind+'    _line='+_egonly[1]+';continue');}
        else{splitColon(_ebody).forEach(function(s){convStmtPy(s,ind+'    ',ctx).forEach(function(l){out.push(l);});});}
      }
      return out;
    }
  }
  var ifM=stmt.match(/^IF\s+(.+?)\s+THEN\s+(.+)$/i);
  if(ifM){
    var then=ifM[2].trim(), gonly=then.match(/^(?:GOTO\s+)?(\d+)$/i);
    out.push(ind+'if '+_fixCmp(E(ifM[1]))+':');
    if(gonly) out.push(ind+'    _line='+gonly[1]+';continue');
    else splitColon(then).forEach(function(s){convStmtPy(s,ind+'    ',ctx).forEach(function(l){out.push(l);});});
    return out;
  }
  var ifGotoM=stmt.match(/^IF\s+(.+?)\s+GOTO\s+(\d+)$/i);
  if(ifGotoM){out.push(ind+'if '+_fixCmp(E(ifGotoM[1]))+': _line='+ifGotoM[2]+';continue');return out;}


  var dimM=stmt.match(/^DIM\s+(.+)$/i);
  if(dimM){var decls=[],cur='',depth=0;
    (dimM[1]+',').split('').forEach(function(ch){if(ch==='(')depth++;if(ch===')')depth--;if(ch===','&&depth===0){decls.push(cur.trim());cur='';}else cur+=ch;});
    decls.forEach(function(d){var am=d.match(/([A-Za-z][A-Za-z0-9]*[%$]?)\s*\(([^)]+)\)/i);
      if(am){var nm=E(am[1]),dims=am[2].split(',').map(function(x){return parseInt(x.trim())+1;});
        if(dims.length===1)out.push(ind+nm+'=[0]*'+dims[0]);
        else if(dims.length===2)out.push(ind+nm+'=[[0]*'+dims[1]+' for _ in range('+dims[0]+')]');
        else out.push(ind+nm+'=[[[0]*'+dims[2]+' for _ in range('+dims[1]+')] for _ in range('+dims[0]+')]');}});
    return out;}

  // Graphics
  if(/^GR$/i.test(stmt)){out.push(ind+"_gr_init('lo')");return out;}
  if(/^HGR2$/i.test(stmt)){out.push(ind+"_gr_init('hi2')");return out;}
  if(/^HGR$/i.test(stmt)){out.push(ind+"_gr_init('hi')");return out;}
  var colorM=stmt.match(/^COLOR\s*=\s*(.+)$/i);
  if(colorM){out.push(ind+'_gr_color(int('+E(colorM[1])+'))');return out;}
  var hcolorM=stmt.match(/^HCOLOR\s*=\s*(.+)$/i);
  if(hcolorM){out.push(ind+'_gr_hcolor(int('+E(hcolorM[1])+'))');return out;}
  var scaleM=stmt.match(/^SCALE\s*=\s*(.+)$/i);
  if(scaleM){out.push(ind+'_gr_scale=int('+E(scaleM[1])+')');return out;}
  var rotM=stmt.match(/^ROT\s*=\s*(.+)$/i);
  if(rotM){out.push(ind+'_gr_rot=int('+E(rotM[1])+')');return out;}
  var plotM=stmt.match(/^PLOT\s+(.+?)\s*,\s*(.+)$/i);
  if(plotM){out.push(ind+'_gr_plot(int('+E(plotM[1])+'),int('+E(plotM[2])+'))');return out;}
  var hplotM=stmt.match(/^HPLOT\s+(.+)$/i);
  if(hplotM){var pts=hplotM[1].split(/\bTO\b/i).map(function(p){return p.trim();});
    var xy0=pts[0].split(',').map(function(q){return q.trim();});
    out.push(ind+'_gr_hmove(int('+E(xy0[0])+'),int('+E(xy0[1])+'))');
    for(var i=1;i<pts.length;i++){var xy=pts[i].split(',').map(function(q){return q.trim();});out.push(ind+'_gr_hline_to(int('+E(xy[0])+'),int('+E(xy[1])+'))');}
    return out;}
  var vlinM=stmt.match(/^VLIN\s+(.+?)\s*,\s*(.+?)\s+AT\s+(.+)$/i);
  if(vlinM){out.push(ind+'_gr_vlin(int('+E(vlinM[1])+'),int('+E(vlinM[2])+'),int('+E(vlinM[3])+'))');return out;}
  var hlinM=stmt.match(/^HLIN\s+(.+?)\s*,\s*(.+?)\s+AT\s+(.+)$/i);
  if(hlinM){out.push(ind+'_gr_hlin(int('+E(hlinM[1])+'),int('+E(hlinM[2])+'),int('+E(hlinM[3])+'))');return out;}

  // DRAW/XDRAW — shape table with decoder
  var drawM=stmt.match(/^(X?)DRAW\s+(.+?)\s+AT\s+(.+?)\s*,\s*(.+)$/i);
  if(drawM){
    var isXdraw=drawM[1].toUpperCase()==='X';
    out.push(ind+'_gr_draw_shape(int('+E(drawM[2])+'),int('+E(drawM[3])+'),int('+E(drawM[4])+'),'+isXdraw+',_gr_scale,_gr_rot)');
    return out;
  }
  // DRAW without AT (shape index only)
  var draw2M=stmt.match(/^(X?)DRAW\s+(\d+)$/i);
  if(draw2M){
    var isXdraw=draw2M[1].toUpperCase()==='X';
    out.push(ind+'_gr_draw_shape(int('+E(draw2M[2])+'),_gr_cx,_gr_cy,'+isXdraw+',_gr_scale,_gr_rot)');
    return out;
  }

  if(/^TEXT$/i.test(stmt)){out.push(ind+'_gr_text()');return out;}
  if(/^HOME$/i.test(stmt)){out.push(ind+"print('\\033[2J\\033[H',end='')");return out;}
  if(/^INVERSE$/i.test(stmt)){out.push(ind+"print('\\033[7m',end='')");return out;}
  if(/^NORMAL$/i.test(stmt)){out.push(ind+"print('\\033[0m',end='')");return out;}
  if(/^FLASH$/i.test(stmt)){out.push(ind+"print('\\033[5m',end='')");return out;}
  var vtabM=stmt.match(/^VTAB\s+(.+)$/i);
  if(vtabM){out.push(ind+"print(f'\\033[{int("+E(vtabM[1])+")+1};1H',end='')");return out;}
  var htabM=stmt.match(/^HTAB\s+(.+)$/i);
  if(htabM){out.push(ind+"print(f'\\033[{int("+E(htabM[1])+")}G',end='')");return out;}

  // POKE with special hardware address handling
  var pokeM=stmt.match(/^POKE\s+(-?\d+)\s*,\s*(.+)$/i);
  if(pokeM){
    var addr=pokeM[1].trim(),val=E(pokeM[2]);
    if(POKE_SPECIAL_PY[addr]){
      if(POKE_SPECIAL_PY[addr].endsWith('()')){out.push(ind+POKE_SPECIAL_PY[addr]);}
      else out.push(ind+'_poke('+addr+','+val+')');
    } else {
      out.push(ind+'_poke('+addr+',int('+val+'))');
    }
    return out;
  }
  // POKE with expression address
  var pokeExprM=stmt.match(/^POKE\s+(.+?)\s*,\s*(.+)$/i);
  if(pokeExprM){out.push(ind+'_poke(int('+E(pokeExprM[1])+'),int('+E(pokeExprM[2])+'))');return out;}

  // CALL with ROM lookup table
  var callM=stmt.match(/^CALL\s+(-?\d+)$/i);
  if(callM){
    var caddr=callM[1].trim();
    if(CALL_TABLE_PY[caddr]){out.push(ind+CALL_TABLE_PY[caddr]);}
    else{out.push(ind+'_call_usr('+caddr+')  # CALL '+caddr);}
    return out;
  }
  var callExprM=stmt.match(/^CALL\s+(.+)$/i);
  if(callExprM){out.push(ind+'_call_usr(int('+E(callExprM[1])+'))');return out;}

  if(/^(HIMEM|LOMEM)\s*:/i.test(stmt)||/^SPEED\s*=/i.test(stmt)){out.push(ind+'pass  # '+stmt);return out;}
  if(/^(PR|IN)#\s*\d+$/i.test(stmt)){out.push(ind+'pass  # '+stmt);return out;}
  if(/^TRACE$/i.test(stmt)){out.push(ind+'_trace=True');return out;}
  if(/^NOTRACE$/i.test(stmt)){out.push(ind+'_trace=False');return out;}
  if(/^CLEAR$/i.test(stmt)){out.push(ind+'pass  # CLEAR');return out;}
  if(/^(NEW|LIST|LOAD|SAVE|RUN)$/i.test(stmt)){out.push(ind+'pass  # '+stmt);return out;}


  // ── LINE command depth-aware coordinate parser ──────────────
  // LINE (x1,y1)-(x2,y2)[,color[,BF]] or LINE -(x2,y2)[,color[,BF]]
  // Handles complex coordinates like CD%(DI,0) which contain commas
  if(/^LINE\b/i.test(stmt)&&!/^LINE\s+INPUT/i.test(stmt)){
    // Parse the LINE statement manually to handle nested parens in coords
    var ls=stmt.replace(/^LINE\s*/i,'');
    // Helper: find depth-0 comma in a string
    function _findComma(s){
      var d=0;
      for(var k=0;k<s.length;k++){
        if(s[k]==='('||s[k]==='[')d++;
        else if(s[k]===')'||s[k]===']')d--;
        else if(s[k]===','&&d===0)return k;
      }
      return -1;
    }
    // Helper: find contents inside first (...) group
    function _innerParen(s,from){
      from=from||0;
      var start=s.indexOf('(',from);

  p('_lnums=['+lineNums.join(',')+']');

  // Build line-number to index map
  var _lmap_arr = {};

  var emitLines=function(ind){

  if(hasOnerr){

    p('while True:');p('    if _line not in _lmap: break');emitLines('    ');
  }

}

  e=e.replace(/\bSCRN\s*\(/gi,'_scrn(');     e=e.replace(/\bPDL\s*\(/gi,'_pdl(');  e=e.replace(/\bSTICK\s*\(/gi,'_stick(');  e=e.replace(/\bSTRIG\s*\(/gi,'_strig(');

function fixJSCmp(e){return e.replace(/([^=!<>])=([^=])/g,'$1===$2');}

function buildJSPrint(args,fnDefs){
  if(args.trim()==='')return['_print("")'];
  var trailSemi=/;\s*$/.test(args),trailComma=/,\s*$/.test(args);
  var parts=[],cur='',inStr=false,depth=0;
  for(var i=0;i<args.length;i++){var ch=args[i];
    if(ch==='"')inStr=!inStr;
    if(!inStr){if(ch==='('||ch==='[')depth++;if(ch===')'||ch===']')depth--;}
    if(!inStr&&depth===0&&(ch===';'||ch===',')){if(cur.trim())parts.push(cur.trim());cur='';}
    else cur+=ch;}
  if(cur.trim())parts.push(cur.trim());
  var jp=parts.map(function(p){return 'String('+exprConvJS(p,fnDefs)+')';}).join('+');
  if(trailSemi)return['_printNoNL('+(jp||'""')+')'];
  if(trailComma)return['_printTab('+(jp||'""')+')'];

// ALTERNATIVE DIALECT CONVERTERS
// ═══════════════════════════════════════════════════════════
function convertAltToPython(code, dialect) {
  code = preprocessSource(code);
  // Pre-process dialect-specific syntax to Applesoft equivalents
  var lines=code.split('\n');
  var converted=lines.map(function(line){
    var m=line.match(/^(\s*\d+\s*)(.*)/);
    if(!m)return line;
    var num=m[1],stmt=m[2];
    if(dialect==='gw'){
      stmt=stmt.replace(/\bCLS\b/gi,'HOME');
      stmt=stmt.replace(/\bINKEY\$/gi,'INKEY$');
    }
    if(dialect==='c64'){
      stmt=stmt.replace(/PRINT\s*CHR\$\s*\(\s*147\s*\)/gi,'HOME');
    }
    if(dialect==='bbc'){
      stmt=stmt.replace(/^CLS\b/i,'HOME');
    }
    return num+stmt;
  });
  var result=convertToPython(converted.join('\n'));
  result.warnings.unshift('Dialect: '+dialect.toUpperCase()+' BASIC');
  return result;
}

function convertAltToHTML(code, dialect) {
  code = preprocessSource(code);
  var lines=code.split('\n');
  var converted=lines.map(function(line){
    var m=line.match(/^(\s*\d+\s*)(.*)/);
    if(!m)return line;
    var num=m[1],stmt=m[2];
    if(dialect==='gw'){
      stmt=stmt.replace(/\bCLS\b/gi,'HOME');
    }
    if(dialect==='c64'){
      stmt=stmt.replace(/PRINT\s*CHR\$\s*\(\s*147\s*\)/gi,'HOME');
    }
    return num+stmt;
  });
  var result=convertToHTML(converted.join('\n'));
  result.warnings.unshift('Dialect: '+dialect.toUpperCase()+' BASIC');
  return result;
}
